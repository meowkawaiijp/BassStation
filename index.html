<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BassStation - オンラインベースチューナー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="resource/style.css">
</head>
<body>
  <header>
    <h1>BassStation</h1>
    <div class="subtitle">オンラインベースチューナー</div>
  </header>
  <main>
    <div class="tuner-container">
      <div class="tuner-display">
        <div class="note-display">--</div>
        <div class="octave-display"></div>
        <div class="frequency-display">0 Hz</div>
        <div id="cents-display" class="cents-display" aria-hidden="true"></div>
        <div class="meter-container" role="meter" aria-label="チューニングのずれ（セント）" aria-valuemin="-50" aria-valuemax="50" aria-valuenow="0">
          <div class="meter-perfect"></div>
          <div class="meter-needle"></div>
        </div>
      </div>
      
      <div class="controls">
        <div class="control-row">
          <div class="control-group">
            <div class="control-label">チューニング</div>
            <select id="tuning-select">
              <option value="standard">スタンダード (E-A-D-G)</option>
              <option value="drop-d">ドロップD (D-A-D-G)</option>
              <option value="five-string">5弦 (B-E-A-D-G)</option>
              <option value="six-string">6弦 (B-E-A-D-G-C)</option>
            </select>
          </div>
          
          <div class="control-group">
            <div class="control-label">基準音</div>
            <select id="reference-select">
              <option value="440">A = 440 Hz</option>
              <option value="442">A = 442 Hz</option>
              <option value="444">A = 444 Hz</option>
              <option value="438">A = 438 Hz</option>
              <option value="432">A = 432 Hz</option>
            </select>
          </div>
        </div>
        
        <div class="control-row">
          <button type="button" id="start-button" aria-pressed="false" aria-label="マイク入力でチューニングを開始">マイクをオン</button>
          <button type="button" id="metronome-button" aria-pressed="false" aria-label="メトロノーム 60 BPM">メトロノーム</button>
        </div>
        
        <div class="control-row">
          <div class="control-group">
            <div class="control-label">マイク感度</div>
            <input type="range" id="sensitivity-slider" min="0.25" max="2" step="0.05" value="1" aria-valuemin="0.25" aria-valuemax="2" aria-valuenow="1" aria-label="マイク感度">
            <span id="sensitivity-value" aria-hidden="true">1.00x</span>
          </div>
        </div>
      </div>
      
      <div class="reference-strings">
        <!-- これらはチューニング選択に基づいて動的に生成されます -->
      </div>
      
      <div class="audio-visualizer">
        <canvas id="waveform-canvas"></canvas>
      </div>
      
      <div class="status-message" id="status-message"></div>
      <div id="tuner-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    </div>
  </main>
  
  <footer>
    <p>© 2025 BassStation - すべてのベーシストのためのツール</p>
  </footer>
  <script src="scripts/main.js" defer></script>
</body>
</html>
